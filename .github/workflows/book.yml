name: book

# Builds the mdbook on every push that touches `book/**` and uploads
# the rendered HTML as a downloadable artifact. The optional
# `deploy` job publishes to GitHub Pages — but **only if Pages is
# already enabled on the repo with "GitHub Actions" as the source**.
# A workflow's default GITHUB_TOKEN lacks the admin permission
# needed to auto-enable Pages, so the one-time setup is manual:
#
#   Repo Settings → Pages → Source: "GitHub Actions"
#
# Until that's configured, the build job still runs and produces a
# downloadable HTML artifact; the deploy job is skipped.

on:
  push:
    branches: [main]
    paths:
      - 'book/**'
      - '.github/workflows/book.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages_enabled: ${{ steps.configure.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install mdbook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build the book
        run: mdbook build book/

      # Always upload as a generic artifact so contributors can grab
      # the rendered HTML even before Pages is enabled.
      - name: Upload generic artifact
        uses: actions/upload-artifact@v4
        with:
          name: book-html
          path: ./book/book

      # Probe whether Pages is enabled on the repo. continue-on-error
      # so the workflow doesn't fail when an admin hasn't toggled
      # Source = "GitHub Actions" yet.
      - name: Configure Pages
        id: configure
        continue-on-error: true
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.configure.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book/book

  deploy:
    needs: build
    if: needs.build.outputs.pages_enabled == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
